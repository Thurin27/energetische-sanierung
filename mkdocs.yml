site_name: Energetische Sanierung
site_description: Lernmaterial Fachschule Umweltschutztechnik – Hans-Schwier-Berufskolleg Gelsenkirchen
site_author: Thorben
# !!! ANPASSEN: site_url auf die spätere Pages-URL setzen (Username + Reponame)
site_url: https://thurin27.github.io/energetische-sanierung/
# !!! ANPASSEN: repo_url für Link "Auf GitHub" in der oberen Leiste
repo_url: https://github.com/thurin27/energetische-sanierung
repo_name: thurin27/energetische-sanierung

theme:
  name: material
  language: de
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Dunkles Design aktivieren
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/weather-night
        name: Helles Design aktivieren
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - assets/katex/katex.min.css
  - stylesheets/task-input.css
  - stylesheets/quiz.css
  - stylesheets/discuss.css

extra_javascript:
  - assets/katex/katex.min.js
  - assets/katex/contrib/auto-render.min.js
  - javascripts/katex-init.js
  - javascripts/task-input.js
  - javascripts/quiz.js

nav:
  - Start: index.md
  - Lernsituation:
      - Familie Schmitt: lernsituation/familie-schmitt.md
      - Unterlagen: lernsituation/unterlagen.md
  - Grundlagen:
      - Wärmedurchgang: grundlagen/waermedurchgang.md
      - Wärmebrücken: grundlagen/waermebruecken.md
      - Feuchteschutz: grundlagen/feuchteschutz.md
      - GEG-Anforderungen: grundlagen/geg-anforderungen.md
  - Fassade WDVS:
      - System: fassade-wdvs/wdvs-system.md
      - Materialien: fassade-wdvs/wdvs-materialien.md
      - Ausführung: fassade-wdvs/wdvs-ausfuehrung.md
      - Konstruktive Details: fassade-wdvs/wdvs-details.md
  - Berechnungen:
      - U-Wert von Bauteilen: berechnungen/u-wert-bauteil.md
      - Transmissionsverluste: berechnungen/transmissionsverluste.md
      - Heizwärmebedarf: berechnungen/heizwaermebedarf.md
      - Aufgabensammlung Schmitt: berechnungen/aufgaben-schmitt.md
  - Wirtschaft & Ökologie:
      - Energiepreise: wirtschaft-oekologie/energiepreise.md
      - Förderung: wirtschaft-oekologie/foerderung.md
      - Amortisation: wirtschaft-oekologie/amortisation.md
      - CO₂-Bilanz: wirtschaft-oekologie/co2-bilanz.md
  - Online-Rechner: rechner/index.md
  - Phase 2:
      - Übersicht: phase2/uebersicht.md
      - Dachsanierung: phase2/dach.md
      - Fenster: phase2/fenster.md
      - Keller & Bodenplatte: phase2/keller.md
      - Anlagentechnik: phase2/anlagentechnik.md
      - Verfahrensvergleich: phase2/vergleich.md
