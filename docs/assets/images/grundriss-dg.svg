<svg viewBox="0 0 900 850" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="850" fill="#fdfdfd"/>

  <!-- Title -->
  <text x="450" y="35" font-size="18" font-weight="700" fill="#222" text-anchor="middle">
    Grundriss Dachgeschoss – EFH Familie Schmitt
  </text>
  <text x="450" y="55" font-size="12" fill="#666" text-anchor="middle">
    Drempelhöhe 1,30 m · Dachneigung 38° · Schrägen unter 2,00 m Stehhöhe grau
  </text>

  <!-- 1 m = 50 px. Außenmaße + Position identisch zu EG. -->

  <!-- Outer wall -->
  <g>
    <rect x="200" y="120" width="500" height="475" fill="#e8d8b8" stroke="#444" stroke-width="1.5"/>
    <rect x="220" y="140" width="460" height="435" fill="#fdfdfd" stroke="#444" stroke-width="1"/>
  </g>

  <!-- Schrägen-Zonen an Traufseiten (Norden + Süden), je 45 px breit -->
  <g>
    <rect x="220" y="140" width="460" height="45" fill="#e0e8d8" stroke="none"/>
    <rect x="220" y="530" width="460" height="45" fill="#e0e8d8" stroke="none"/>
    <line x1="220" y1="185" x2="680" y2="185" stroke="#888" stroke-width="0.7" stroke-dasharray="4,3"/>
    <line x1="220" y1="530" x2="680" y2="530" stroke="#888" stroke-width="0.7" stroke-dasharray="4,3"/>
    <text x="335" y="174" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Schräge unter 2,00 m Stehhöhe</text>
    <text x="335" y="556" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Schräge unter 2,00 m Stehhöhe</text>
  </g>

  <!-- Innenwände
       Schlafzimmer Eltern: x=220..465 komplett (linke Hälfte des Hauses)
       Treppe: x=500..550, y=280..440 (identisch zu EG)
       Flur: x=550..595, y=140..575 (1 m breiter Gang rechts der Treppe)
       Rechte Räume: x=605..680
         - Kind 1: y=140..280
         - Bad:    y=290..420
         - Kind 2: y=430..575
  -->

  <!-- Vertikale Wand x=470 (zwischen Schlafzimmer Eltern und Treppen-/Flurbereich) -->
  <rect x="465" y="140" width="10" height="435" fill="#a89070"/>

  <!-- Vertikale Wand x=600 (zwischen Flur und rechten Räumen) -->
  <rect x="595" y="140" width="10" height="435" fill="#a89070"/>

  <!-- Horizontale Wände im rechten Bereich: y=285 (Kind 1 ↔ Bad), y=425 (Bad ↔ Kind 2) -->
  <rect x="605" y="280" width="75" height="10" fill="#a89070"/>
  <rect x="605" y="420" width="75" height="10" fill="#a89070"/>

  <!-- Türöffnungen -->
  <!-- Schlafzimmer Eltern → Flur (Tür in vertikaler Wand x=470, etwa Mitte) -->
  <rect x="465" y="365" width="10" height="40" fill="#fdfdfd"/>
  <!-- Kind 1 → Flur (Tür in vertikaler Wand x=600, im Kind-1-Bereich) -->
  <rect x="595" y="200" width="10" height="40" fill="#fdfdfd"/>
  <!-- Bad → Flur (Tür in vertikaler Wand x=600, mittig im Bad-Bereich) -->
  <rect x="595" y="340" width="10" height="40" fill="#fdfdfd"/>
  <!-- Kind 2 → Flur -->
  <rect x="595" y="490" width="10" height="40" fill="#fdfdfd"/>

  <!-- Türbögen -->
  <g stroke="#888" stroke-width="0.8" fill="none" stroke-dasharray="2,2">
    <path d="M 475,370 a 35,35 0 0 1 35,35"/>
    <path d="M 595,205 a 35,35 0 0 0 -35,35"/>
    <path d="M 595,345 a 35,35 0 0 0 -35,35"/>
    <path d="M 595,495 a 35,35 0 0 0 -35,35"/>
  </g>
  <g stroke="#444" stroke-width="1.2">
    <line x1="475" y1="370" x2="510" y2="370"/>
    <line x1="595" y1="205" x2="560" y2="205"/>
    <line x1="595" y1="345" x2="560" y2="345"/>
    <line x1="595" y1="495" x2="560" y2="495"/>
  </g>

  <!-- TREPPENÖFFNUNG (Loch im Boden, identisch zu EG) -->
  <g>
    <rect x="500" y="280" width="50" height="160" fill="#fdfdfd" stroke="#666" stroke-width="0.7" stroke-dasharray="3,2"/>
    <!-- Stufen leicht gestrichelt (Sicht von oben in die Treppe nach unten) -->
    <g stroke="#cccccc" stroke-width="0.5">
      <line x1="500" y1="294" x2="550" y2="294"/>
      <line x1="500" y1="308" x2="550" y2="308"/>
      <line x1="500" y1="322" x2="550" y2="322"/>
      <line x1="500" y1="336" x2="550" y2="336"/>
      <line x1="500" y1="350" x2="550" y2="350"/>
      <line x1="500" y1="364" x2="550" y2="364"/>
      <line x1="500" y1="378" x2="550" y2="378"/>
      <line x1="500" y1="392" x2="550" y2="392"/>
      <line x1="500" y1="406" x2="550" y2="406"/>
      <line x1="500" y1="420" x2="550" y2="420"/>
    </g>
    <!-- Pfeil nach unten (Abgang ins EG) -->
    <line x1="525" y1="295" x2="525" y2="430" stroke="#444" stroke-width="1"/>
    <polygon points="525,435 520,425 530,425" fill="#444"/>
    <text x="525" y="265" text-anchor="middle" font-size="10" fill="#444" font-style="italic">Austritt OG</text>
    <text x="525" y="455" text-anchor="middle" font-size="9" fill="#444" font-style="italic">↓ ins EG</text>
  </g>

  <!-- FENSTER -->
  <!-- Schlafzimmer Eltern Westen 1× 1,40 m -->
  <g>
    <rect x="200" y="280" width="20" height="70" fill="#cce4f0"/>
    <line x1="205" y1="280" x2="205" y2="350" stroke="#444" stroke-width="0.8"/>
    <line x1="215" y1="280" x2="215" y2="350" stroke="#444" stroke-width="0.8"/>
  </g>
  <!-- Schlafzimmer Eltern Süden (in Schräge): 1× 1,00 m -->
  <g>
    <rect x="290" y="575" width="50" height="20" fill="#cce4f0"/>
    <line x1="290" y1="580" x2="340" y2="580" stroke="#444" stroke-width="0.8"/>
    <line x1="290" y1="590" x2="340" y2="590" stroke="#444" stroke-width="0.8"/>
  </g>
  <!-- Kind 1 Norden (in Schräge): 1× 1,00 m -->
  <g>
    <rect x="625" y="120" width="50" height="20" fill="#cce4f0"/>
    <line x1="625" y1="125" x2="675" y2="125" stroke="#444" stroke-width="0.8"/>
    <line x1="625" y1="135" x2="675" y2="135" stroke="#444" stroke-width="0.8"/>
  </g>
  <!-- Bad Osten 1× 0,80 m (klein, hochliegend) -->
  <g>
    <rect x="680" y="335" width="20" height="40" fill="#cce4f0"/>
    <line x1="685" y1="335" x2="685" y2="375" stroke="#444" stroke-width="0.8"/>
    <line x1="695" y1="335" x2="695" y2="375" stroke="#444" stroke-width="0.8"/>
  </g>
  <!-- Kind 2 Süden (in Schräge): 1× 1,00 m -->
  <g>
    <rect x="625" y="575" width="50" height="20" fill="#cce4f0"/>
    <line x1="625" y1="580" x2="675" y2="580" stroke="#444" stroke-width="0.8"/>
    <line x1="625" y1="590" x2="675" y2="590" stroke="#444" stroke-width="0.8"/>
  </g>
  <!-- Kind 2 Osten 1× 1,00 m -->
  <g>
    <rect x="680" y="490" width="20" height="50" fill="#cce4f0"/>
    <line x1="685" y1="490" x2="685" y2="540" stroke="#444" stroke-width="0.8"/>
    <line x1="695" y1="490" x2="695" y2="540" stroke="#444" stroke-width="0.8"/>
  </g>

  <!-- Raumbeschriftungen -->
  <g font-size="13" fill="#222">
    <!-- Schlafzimmer Eltern (links komplett) -->
    <text x="345" y="360" text-anchor="middle" font-weight="700">Schlafzimmer Eltern</text>
    <text x="345" y="377" text-anchor="middle" font-size="11" fill="#555">~ 25 m² (mit Schräge)</text>

    <!-- Flur (zwischen Treppe und rechten Räumen, schmal) -->
    <text x="572" y="155" text-anchor="middle" font-size="10" font-weight="700" fill="#444">Flur</text>

    <!-- Kind 1 (oben rechts) -->
    <text x="640" y="220" text-anchor="middle" font-weight="700" font-size="12">Kind 1</text>
    <text x="640" y="237" text-anchor="middle" font-size="10" fill="#555">~ 11 m² (Lina)</text>

    <!-- Bad (mittig rechts) -->
    <text x="640" y="350" text-anchor="middle" font-weight="700" font-size="12">Bad</text>
    <text x="640" y="367" text-anchor="middle" font-size="10" fill="#555">~ 7 m²</text>

    <!-- Kind 2 (unten rechts) -->
    <text x="640" y="500" text-anchor="middle" font-weight="700" font-size="12">Kind 2</text>
    <text x="640" y="517" text-anchor="middle" font-size="10" fill="#555">~ 11 m² (Tom)</text>
  </g>

  <!-- DIMENSION LINES -->
  <g stroke="#666" stroke-width="0.7" fill="#666" font-size="11">
    <line x1="200" y1="100" x2="700" y2="100"/>
    <line x1="200" y1="95" x2="200" y2="105"/>
    <line x1="700" y1="95" x2="700" y2="105"/>
    <text x="450" y="93" text-anchor="middle" font-weight="600">10,00 m</text>
  </g>
  <g stroke="#666" stroke-width="0.7" fill="#666" font-size="11">
    <line x1="730" y1="120" x2="730" y2="595"/>
    <line x1="725" y1="120" x2="735" y2="120"/>
    <line x1="725" y1="595" x2="735" y2="595"/>
    <text x="755" y="362" font-weight="600" transform="rotate(90,755,362)" text-anchor="middle">9,50 m</text>
  </g>

  <!-- Compass -->
  <g transform="translate(800,150)">
    <circle r="22" fill="none" stroke="#444" stroke-width="0.8"/>
    <line x1="0" y1="22" x2="0" y2="-22" stroke="#444" stroke-width="0.8"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#444" stroke-width="0.5"/>
    <polygon points="0,-22 -5,-10 5,-10" fill="#c0392b"/>
    <text x="0" y="-28" font-size="11" font-weight="700" fill="#c0392b" text-anchor="middle">N</text>
  </g>

  <!-- LEGEND BOX -->
  <g transform="translate(40,650)">
    <rect x="0" y="0" width="820" height="180" fill="#f7f7f0" stroke="#888" stroke-width="0.7" rx="3"/>
    <text x="15" y="22" font-size="13" font-weight="700" fill="#2D5C20">Daten zur Gebäudeerfassung – Dachgeschoss</text>

    <g font-size="12" fill="#222">
      <text x="15" y="48" font-weight="600">Wohnflächen (mit WoFlV-Anrechnung)</text>
      <text x="15" y="65">Schlafzimmer Eltern</text>      <text x="200" y="65">~ 25 m² (anrechenbar)</text>
      <text x="15" y="82">Kinderzimmer 1 (Lina)</text>     <text x="200" y="82">~ 11 m²</text>
      <text x="15" y="99">Kinderzimmer 2 (Tom)</text>      <text x="200" y="99">~ 11 m²</text>
      <text x="15" y="116">Bad</text>                       <text x="200" y="116">~ 7 m²</text>
      <text x="15" y="133">Flur (mit Treppenöffnung)</text> <text x="200" y="133">~ 7 m²</text>
      <text x="15" y="150" font-weight="600">Σ OG</text>    <text x="200" y="150" font-weight="600">≈ 72 m² (Wohnfläche)</text>
      <text x="15" y="170" font-style="italic" fill="#666">Voll: 63,5 m² · Halb: 16,6 m² → 8,3 m² gewichtet</text>

      <text x="380" y="48" font-weight="600">Bauteile OG</text>
      <text x="380" y="65">Außenwand brutto OG (39,0 × 1,30)</text> <text x="640" y="65">50,7 m²</text>
      <text x="380" y="82">Fensterfläche OG (5 Stück)</text>        <text x="640" y="82">6,1 m²</text>
      <text x="380" y="99" font-weight="600">Außenwand brutto gesamt</text> <text x="640" y="99" font-weight="600">167,7 m²</text>
      <text x="380" y="116" font-weight="600">Fenster + Tür gesamt</text> <text x="640" y="116" font-weight="600">15,5 m²</text>
      <text x="380" y="133" font-weight="700" fill="#2D5C20">Außenwand netto</text> <text x="640" y="133" font-weight="700" fill="#2D5C20">≈ 152 m²</text>
      <text x="380" y="155">Dachfläche (38°, beidseitig)</text>      <text x="640" y="155">≈ 121 m²</text>
    </g>
  </g>
</svg>
