<svg viewBox="0 0 900 850" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="850" fill="#fdfdfd"/>

  <!-- Title -->
  <text x="450" y="35" font-size="18" font-weight="700" fill="#222" text-anchor="middle">
    Grundriss Erdgeschoss – EFH Familie Schmitt
  </text>
  <text x="450" y="55" font-size="12" fill="#666" text-anchor="middle">
    Maßstab schematisch · Außenmaße 10,00 m × 9,50 m · Wandstärke Außenwand 40 cm
  </text>

  <!-- 1 m = 50 px. House outer 10x9.5 m → 500 x 475 px.
       Position house with top-left at (200, 120). Outer wall thickness 20 px (= 40 cm). -->

  <!-- Outer wall -->
  <g>
    <rect x="200" y="120" width="500" height="475" fill="#e8d8b8" stroke="#444" stroke-width="1.5"/>
    <rect x="220" y="140" width="460" height="435" fill="#fdfdfd" stroke="#444" stroke-width="1"/>
  </g>

  <!-- Inner walls
       Layout (Sicht von oben, Norden=oben, Süden=unten):
         - Vertikale Trennwand x=475 teilt Haus links (Wohnen/Essen) und rechts (Diele/Küche/WC)
         - Im rechten Bereich: Diele in der Mitte mit Treppe (zentral platziert), 
           Küche oben rechts, Gäste-WC unten rechts -->

  <!-- Vertikale Trennwand x=475 (= 5,50 m vom linken Außenrand) -->
  <rect x="470" y="140" width="10" height="435" fill="#a89070"/>

  <!-- Horizontale Wand zwischen Esszimmer und Wohnzimmer (links) bei y=305 -->
  <rect x="220" y="300" width="250" height="10" fill="#a89070"/>

  <!-- Horizontale Wand zwischen Küche (Norden) und Diele bei y=255 -->
  <rect x="480" y="250" width="200" height="10" fill="#a89070"/>

  <!-- Horizontale Wand zwischen Diele und Gäste-WC bei y=460 -->
  <rect x="600" y="455" width="80" height="10" fill="#a89070"/>
  <!-- Vertikale Wand zwischen Diele und WC bei x=600 -->
  <rect x="595" y="455" width="10" height="120" fill="#a89070"/>

  <!-- Türöffnungen (weiß) -->
  <!-- Esszimmer (links oben) → Diele -->
  <rect x="470" y="200" width="10" height="40" fill="#fdfdfd"/>
  <!-- Wohnzimmer (links unten) → Diele -->
  <rect x="470" y="430" width="10" height="40" fill="#fdfdfd"/>
  <!-- Küche → Diele (in horizontaler Wand) -->
  <rect x="540" y="250" width="40" height="10" fill="#fdfdfd"/>
  <!-- WC-Tür -->
  <rect x="610" y="455" width="40" height="10" fill="#fdfdfd"/>
  <!-- Esszimmer ↔ Wohnzimmer (innen) -->
  <rect x="320" y="300" width="40" height="10" fill="#fdfdfd"/>

  <!-- Türbögen -->
  <g stroke="#888" stroke-width="0.8" fill="none" stroke-dasharray="2,2">
    <path d="M 480,205 a 35,35 0 0 1 35,35"/>
    <path d="M 480,435 a 35,35 0 0 1 35,35"/>
    <path d="M 575,260 a 35,35 0 0 0 -35,35"/>
    <path d="M 615,465 a 35,35 0 0 1 35,35"/>
    <path d="M 325,310 a 35,35 0 0 1 35,35"/>
  </g>
  <g stroke="#444" stroke-width="1.2">
    <line x1="480" y1="205" x2="515" y2="205"/>
    <line x1="480" y1="435" x2="515" y2="435"/>
    <line x1="540" y1="260" x2="540" y2="295"/>
    <line x1="615" y1="465" x2="650" y2="465"/>
    <line x1="325" y1="310" x2="325" y2="345"/>
  </g>

  <!-- TREPPE in der Diele zentral
       Treppenlauf 1.00 × 3.20 m → 50 × 160 px
       Position x=500..550, y=280..440 (Lauf nach OBEN, d.h. die unteren Stufen sind unten) -->
  <g>
    <rect x="500" y="280" width="50" height="160" fill="#f8f0e0" stroke="#666" stroke-width="0.7"/>
    <!-- Stufen: 11 Stufen → 11 horizontale Linien zwischen y=280 und y=440 -->
    <g stroke="#666" stroke-width="0.5">
      <line x1="500" y1="294" x2="550" y2="294"/>
      <line x1="500" y1="308" x2="550" y2="308"/>
      <line x1="500" y1="322" x2="550" y2="322"/>
      <line x1="500" y1="336" x2="550" y2="336"/>
      <line x1="500" y1="350" x2="550" y2="350"/>
      <line x1="500" y1="364" x2="550" y2="364"/>
      <line x1="500" y1="378" x2="550" y2="378"/>
      <line x1="500" y1="392" x2="550" y2="392"/>
      <line x1="500" y1="406" x2="550" y2="406"/>
      <line x1="500" y1="420" x2="550" y2="420"/>
    </g>
    <!-- Pfeil nach oben (unten = Antritt, oben = Austritt) -->
    <line x1="525" y1="430" x2="525" y2="290" stroke="#444" stroke-width="1"/>
    <polygon points="525,285 520,295 530,295" fill="#444"/>
    <text x="525" y="450" text-anchor="middle" font-size="9" fill="#444" font-style="italic">Antritt</text>
  </g>

  <!-- FENSTER -->
  <!-- 1. Wohnzimmer Süden 2× 1,40 m -->
  <g>
    <rect x="240" y="575" width="70" height="20" fill="#cce4f0"/>
    <line x1="240" y1="580" x2="310" y2="580" stroke="#444" stroke-width="0.8"/>
    <line x1="240" y1="590" x2="310" y2="590" stroke="#444" stroke-width="0.8"/>
    <rect x="380" y="575" width="70" height="20" fill="#cce4f0"/>
    <line x1="380" y1="580" x2="450" y2="580" stroke="#444" stroke-width="0.8"/>
    <line x1="380" y1="590" x2="450" y2="590" stroke="#444" stroke-width="0.8"/>
  </g>
  <!-- 2. Esszimmer Westen 1× 1,40 m -->
  <g>
    <rect x="200" y="180" width="20" height="70" fill="#cce4f0"/>
    <line x1="205" y1="180" x2="205" y2="250" stroke="#444" stroke-width="0.8"/>
    <line x1="215" y1="180" x2="215" y2="250" stroke="#444" stroke-width="0.8"/>
  </g>
  <!-- 3. Wohnzimmer Westen 1× 1,40 m -->
  <g>
    <rect x="200" y="400" width="20" height="70" fill="#cce4f0"/>
    <line x1="205" y1="400" x2="205" y2="470" stroke="#444" stroke-width="0.8"/>
    <line x1="215" y1="400" x2="215" y2="470" stroke="#444" stroke-width="0.8"/>
  </g>
  <!-- 4. Küche Osten 1× 1,00 m -->
  <g>
    <rect x="680" y="180" width="20" height="50" fill="#cce4f0"/>
    <line x1="685" y1="180" x2="685" y2="230" stroke="#444" stroke-width="0.8"/>
    <line x1="695" y1="180" x2="695" y2="230" stroke="#444" stroke-width="0.8"/>
  </g>
  <!-- 5. WC Osten 1× 0,80 m (klein) -->
  <g>
    <rect x="680" y="500" width="20" height="40" fill="#cce4f0"/>
    <line x1="685" y1="500" x2="685" y2="540" stroke="#444" stroke-width="0.8"/>
    <line x1="695" y1="500" x2="695" y2="540" stroke="#444" stroke-width="0.8"/>
  </g>

  <!-- HAUSTÜR (Norden), 1,00 m breit -->
  <g>
    <rect x="585" y="120" width="50" height="20" fill="#fdfdfd" stroke="#444" stroke-width="1.5"/>
    <path d="M 585,140 a 50,50 0 0 1 50,-50" stroke="#888" stroke-width="0.8" fill="none" stroke-dasharray="2,2"/>
    <line x1="585" y1="140" x2="635" y2="140" stroke="#444" stroke-width="1.2"/>
    <line x1="585" y1="140" x2="585" y2="90" stroke="#444" stroke-width="1.2"/>
  </g>

  <!-- Raumbeschriftungen -->
  <g font-size="13" fill="#222">
    <text x="345" y="425" text-anchor="middle" font-weight="700">Wohnzimmer</text>
    <text x="345" y="442" text-anchor="middle" font-size="11" fill="#555">28,2 m²</text>

    <text x="345" y="220" text-anchor="middle" font-weight="700">Esszimmer</text>
    <text x="345" y="237" text-anchor="middle" font-size="11" fill="#555">15,8 m²</text>

    <text x="585" y="200" text-anchor="middle" font-weight="700">Küche</text>
    <text x="585" y="217" text-anchor="middle" font-size="11" fill="#555">10,6 m²</text>

    <!-- Diele beschriftet rechts neben der Treppe -->
    <text x="610" y="320" text-anchor="middle" font-weight="700" font-size="12">Diele</text>
    <text x="610" y="335" text-anchor="middle" font-size="11" fill="#555">9,4 m²</text>

    <text x="640" y="510" text-anchor="middle" font-weight="700" font-size="11">Gäste-WC</text>
    <text x="640" y="525" text-anchor="middle" font-size="10" fill="#555">3,2 m²</text>

    <text x="610" y="160" text-anchor="middle" font-size="11" fill="#555">Eingang</text>
  </g>

  <!-- DIMENSION LINES -->
  <g stroke="#666" stroke-width="0.7" fill="#666" font-size="11">
    <line x1="200" y1="100" x2="700" y2="100"/>
    <line x1="200" y1="95" x2="200" y2="105"/>
    <line x1="700" y1="95" x2="700" y2="105"/>
    <line x1="200" y1="80" x2="200" y2="120"/>
    <line x1="700" y1="80" x2="700" y2="120"/>
    <text x="450" y="93" text-anchor="middle" font-weight="600">10,00 m</text>
  </g>
  <g stroke="#666" stroke-width="0.7" fill="#666" font-size="11">
    <line x1="730" y1="120" x2="730" y2="595"/>
    <line x1="725" y1="120" x2="735" y2="120"/>
    <line x1="725" y1="595" x2="735" y2="595"/>
    <line x1="700" y1="120" x2="745" y2="120"/>
    <line x1="700" y1="595" x2="745" y2="595"/>
    <text x="755" y="362" font-weight="600" transform="rotate(90,755,362)" text-anchor="middle">9,50 m</text>
  </g>

  <!-- Window dimensions south -->
  <g stroke="#888" stroke-width="0.5" fill="#444" font-size="10">
    <line x1="240" y1="615" x2="310" y2="615"/>
    <line x1="240" y1="610" x2="240" y2="620"/>
    <line x1="310" y1="610" x2="310" y2="620"/>
    <text x="275" y="630" text-anchor="middle">1,40 m</text>

    <line x1="380" y1="615" x2="450" y2="615"/>
    <line x1="380" y1="610" x2="380" y2="620"/>
    <line x1="450" y1="610" x2="450" y2="620"/>
    <text x="415" y="630" text-anchor="middle">1,40 m</text>
  </g>

  <!-- Compass -->
  <g transform="translate(800,150)">
    <circle r="22" fill="none" stroke="#444" stroke-width="0.8"/>
    <line x1="0" y1="22" x2="0" y2="-22" stroke="#444" stroke-width="0.8"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#444" stroke-width="0.5"/>
    <polygon points="0,-22 -5,-10 5,-10" fill="#c0392b"/>
    <text x="0" y="-28" font-size="11" font-weight="700" fill="#c0392b" text-anchor="middle">N</text>
  </g>

  <!-- Cardinal directions -->
  <g font-size="10" fill="#888" font-style="italic">
    <text x="450" y="118" text-anchor="middle">Norden</text>
    <text x="450" y="615" text-anchor="middle" fill="#aa5530">Süden</text>
    <text x="180" y="362" text-anchor="end">Westen</text>
    <text x="720" y="362">Osten</text>
  </g>

  <!-- LEGEND BOX -->
  <g transform="translate(40,650)">
    <rect x="0" y="0" width="820" height="180" fill="#f7f7f0" stroke="#888" stroke-width="0.7" rx="3"/>
    <text x="15" y="22" font-size="13" font-weight="700" fill="#2D5C20">Daten zur Gebäudeerfassung</text>

    <g font-size="12" fill="#222">
      <text x="15" y="48" font-weight="600">Wohnflächen</text>
      <text x="15" y="65">Wohnzimmer</text>     <text x="160" y="65">28,2 m²</text>
      <text x="15" y="82">Esszimmer</text>       <text x="160" y="82">15,8 m²</text>
      <text x="15" y="99">Küche</text>           <text x="160" y="99">10,6 m²</text>
      <text x="15" y="116">Diele + Gäste-WC</text> <text x="160" y="116">12,6 m²</text>
      <text x="15" y="133">Treppe</text>          <text x="160" y="133">3,5 m²</text>
      <text x="15" y="150" font-weight="600">Σ EG</text> <text x="160" y="150" font-weight="600">≈ 73 m² (Wohnfläche)</text>

      <text x="280" y="48" font-weight="600">Bauteil-Bruttoflächen</text>
      <text x="280" y="65">EG-Außenfläche (10,00 × 9,50)</text> <text x="510" y="65">95,0 m²</text>
      <text x="280" y="82">Umfang × Wandhöhe (39,0 × 4,30)</text> <text x="510" y="82">167,7 m²</text>
      <text x="280" y="99">Fensterfläche EG (5 Stück)</text>     <text x="510" y="99">7,4 m²</text>
      <text x="280" y="116">Haustürfläche (1,00 × 2,10)</text>    <text x="510" y="116">2,1 m²</text>
      <text x="280" y="133" fill="#666" font-style="italic">→ Fenster/Tür gesamt EG+OG: siehe DG-Plan</text>

      <text x="600" y="48" font-weight="600">Gebäudegeometrie</text>
      <text x="600" y="65">Geschosshöhe EG</text>      <text x="740" y="65">2,90 m</text>
      <text x="600" y="82">Drempelhöhe OG</text>        <text x="740" y="82">1,30 m</text>
      <text x="600" y="99">Wandhöhe gesamt</text>       <text x="740" y="99">4,30 m</text>
      <text x="600" y="116">Dachneigung</text>           <text x="740" y="116">38°</text>
      <text x="600" y="133">Wandstärke außen</text>      <text x="740" y="133">40 cm</text>
    </g>
  </g>
</svg>
