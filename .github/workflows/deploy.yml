name: Deploy MkDocs site to GitHub Pages

on:
  push:
    branches: [main]
  # ermöglicht manuellen Trigger über die Actions-Seite
  workflow_dispatch:

# nur ein Build/Deploy gleichzeitig erlauben
concurrency:
  group: pages
  cancel-in-progress: false

# Berechtigungen für den GITHUB_TOKEN, um in Pages zu deployen
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pip-Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: MkDocs bauen
        run: mkdocs build --strict --site-dir _site

      - name: Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
